name: Bug Report
description: Report a bug with UmamiHA
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: UmamiHA Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "2024.12.0"
    validations:
      required: true
  - type: input
    id: umami_version
    attributes:
      label: Umami Version
      placeholder: "2.x.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Copy any relevant logs from Settings > System > Logs.
      render: text
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or configuration details.
